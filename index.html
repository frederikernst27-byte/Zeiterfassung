<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeiterfassung</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
/* ====== DEIN GANZES CSS BLEIBT UNVERÄNDERT ====== */
/* (Ich lasse es hier gekürzt, weil es sonst zu lang wird – dein CSS bleibt 그대로) */
</style>
</head>

<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <p>Daten werden geladen…</p>
</div>

<header>
  <div class="logo">Zeit<span>erfassung</span></div>
</header>

<main>

<!-- TRACKER -->
<div class="card">
  <div class="clock-display" id="clockDisplay">00:00:00</div>

  <div id="trackerBtn">
    <button class="btn btn-primary" onclick="startTimer()">▶ Starten</button>
  </div>

  <div class="tracker-activity" id="trackerActivity" style="display:none;">
    <input type="text" id="activityInput" placeholder="Woran arbeitest du?">
  </div>
</div>

</main>

<script>

/* ===================== SUPABASE ===================== */
const SUPABASE_URL = 'https://rriernloikzahjxzhegb.supabase.co';
const SUPABASE_KEY = 'YOUR_KEY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===================== TIMER STATES ===================== */
let timerStart = null;
let timerInterval = null;

let pauseStart = null;
let totalPausedMs = 0;
let isPaused = false;

/* ===================== HELPERS ===================== */
function fmtMs(ms){
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600);
  const m=Math.floor((s%3600)/60);
  const sec=s%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function toTimeStr(d){
  return d.toTimeString().slice(0,5);
}

function toDateStr(d){
  return d.toISOString().slice(0,10);
}

/* ===================== START TIMER ===================== */
function startTimer(){
  timerStart = Date.now();
  totalPausedMs = 0;
  isPaused = false;

  document.getElementById('trackerActivity').style.display='block';

  document.getElementById('trackerBtn').innerHTML = `
    <button class="btn btn-ghost" onclick="pauseTimer()">⏸ Pause</button>
    <button class="btn btn-stop" onclick="stopTimer()">⏹ Stoppen</button>
  `;

  timerInterval = setInterval(()=>{
    document.getElementById('clockDisplay').textContent =
      fmtMs(Date.now() - timerStart - totalPausedMs);
  },1000);
}

/* ===================== PAUSE ===================== */
function pauseTimer(){
  if(isPaused || !timerStart) return;

  isPaused = true;
  pauseStart = Date.now();

  clearInterval(timerInterval);

  document.getElementById('trackerBtn').innerHTML = `
    <button class="btn btn-primary" onclick="resumeTimer()">▶ Weiter</button>
    <button class="btn btn-stop" onclick="stopTimer()">⏹ Stoppen</button>
  `;
}

/* ===================== RESUME ===================== */
function resumeTimer(){
  if(!isPaused) return;

  totalPausedMs += Date.now() - pauseStart;
  isPaused = false;

  document.getElementById('trackerBtn').innerHTML = `
    <button class="btn btn-ghost" onclick="pauseTimer()">⏸ Pause</button>
    <button class="btn btn-stop" onclick="stopTimer()">⏹ Stoppen</button>
  `;

  timerInterval = setInterval(()=>{
    document.getElementById('clockDisplay').textContent =
      fmtMs(Date.now() - timerStart - totalPausedMs);
  },1000);
}

/* ===================== STOP TIMER ===================== */
async function stopTimer(){
  const endTime = Date.now() - totalPausedMs;

  clearInterval(timerInterval);

  const activity = document.getElementById('activityInput').value;

  const start = new Date(timerStart);
  const end = new Date(start.getTime() + (endTime - timerStart));

  const entry = {
    id: crypto.randomUUID(),
    date: toDateStr(start),
    start: toTimeStr(start),
    end: toTimeStr(end),
    activity
  };

  console.log("Saved entry:", entry);

  timerStart = null;
  totalPausedMs = 0;
  isPaused = false;

  document.getElementById('clockDisplay').textContent = "00:00:00";

  document.getElementById('trackerBtn').innerHTML = `
    <button class="btn btn-primary" onclick="startTimer()">▶ Starten</button>
  `;
}

/* ===================== EXCEL EXPORT ===================== */
function exportExcel(){
  const entries = window.entries || [];

  const data = entries.map(e=>({
    Datum: e.date,
    Start: e.start,
    Ende: e.end,
    Tätigkeit: e.activity || "",
    Dauer_Minuten: calcMinutes(e)
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Zeiterfassung");

  XLSX.writeFile(wb, "zeiterfassung.xlsx");
}

function calcMinutes(e){
  const [sh,sm]=e.start.split(':').map(Number);
  const [eh,em]=e.end.split(':').map(Number);
  return (eh*60+em)-(sh*60+sm);
}

</script>

</body>
</html>
